<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI News Digest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f3;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.card{background:#fff;border-radius:16px;border:0.5px solid #ddd;width:100%;max-width:640px;display:flex;flex-direction:column;height:88vh;max-height:700px;overflow:hidden}
.url-bar{background:#faeeda;border-bottom:0.5px solid #fac775;padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:12px;color:#633806}
.url-bar input{flex:1;border:0.5px solid #fac775;border-radius:6px;padding:4px 8px;font-size:12px;background:#fff8f0;color:#412402;font-family:monospace}
.url-bar button{padding:4px 12px;border-radius:6px;background:#854f0b;color:#fff;border:none;font-size:12px;cursor:pointer}
.header{padding:12px 16px;border-bottom:0.5px solid #eee;display:flex;align-items:center;gap:10px}
.dot{width:10px;height:10px;background:#1d9e75;border-radius:50%}
.header h1{font-size:15px;font-weight:500;color:#1a1a1a}
.status{font-size:12px;color:#888;margin-left:auto}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;flex-direction:column;max-width:85%}
.msg.user{align-self:flex-end;align-items:flex-end}
.msg.bot{align-self:flex-start;align-items:flex-start}
.bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6}
.msg.user .bubble{background:#534ab7;color:#fff;border-bottom-right-radius:4px}
.msg.bot .bubble{background:#f1efe8;color:#2c2c2a;border-bottom-left-radius:4px}
.bubble.err{background:#fcebeb;color:#a32d2d}
.ts{font-size:11px;color:#aaa;margin-top:4px;padding:0 4px}
.typing{display:flex;gap:5px;padding:12px 14px;background:#f1efe8;border-radius:14px;border-bottom-left-radius:4px;align-items:center}
.typing span{width:7px;height:7px;background:#888;border-radius:50%;animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.3}40%{opacity:1}}
.chips{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 8px}
.chips button{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid #ccc;background:#fff;color:#444;cursor:pointer}
.chips button:hover{background:#f1efe8}
.input-row{display:flex;gap:8px;padding:8px 16px 12px;border-top:0.5px solid #eee}
#txt{flex:1;border:0.5px solid #ddd;border-radius:24px;padding:10px 16px;font-size:14px;outline:none;font-family:inherit;color:#1a1a1a;background:#fafaf9}
#txt:focus{border-color:#534ab7}
#btn{width:44px;height:44px;border-radius:50%;background:#534ab7;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#btn:hover{background:#3c3489}
#btn:disabled{background:#ccc;cursor:default}
#btn svg{width:18px;height:18px;fill:#fff}
</style>
</head>
<body>
<div class="card">
  <!-- url bar hidden for production -->
  <div class="header">
    <div class="dot"></div>
    <h1>AI News Digest</h1>
    <span class="status" id="st">Ready</span>
  </div>
  <div class="messages" id="msgs">
    <div class="msg bot">
      <div class="bubble">Hi! Tell me what topics you want a digest for — e.g. <em>"Send AI digest to myemail@gmail.com"</em></div>
      <div class="ts">Just now</div>
    </div>
  </div>
  <div class="chips">
    <button onclick="qs('Send me an AI & GenAI news digest today')">AI & GenAI</button>
    <button onclick="qs('Send a digest on Indian startups and fintech')">Indian startups</button>
    <button onclick="qs('Digest on product management and B2B SaaS')">PM & SaaS</button>
    <button onclick="qs('Send a digest on global markets and economy')">Markets</button>
  </div>
  <div class="input-row">
    <input id="txt" type="text" placeholder="Type your request..." onkeydown="if(event.key==='Enter')send()">
    <button id="btn" onclick="send()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
var N8N_URL = localStorage.getItem('n8n_url') || 'https://ainews.tushar1987chopra.workers.dev/';
document.getElementById('wurl').value = N8N_URL;

function saveUrl() {
  N8N_URL = document.getElementById('wurl').value.trim();
  localStorage.setItem('n8n_url', N8N_URL);
  setSt('Saved!');
  setTimeout(function(){ setSt('Ready'); }, 2000);
}

function setSt(t){ document.getElementById('st').textContent = t; }

function getTime(){
  return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function getSid(){
  if(!sessionStorage.getItem('sid')) sessionStorage.setItem('sid','s_'+Date.now());
  return sessionStorage.getItem('sid');
}

function addMsg(text, role, isErr) {
  var msgs = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = '<div class="bubble' + (isErr?' err':'') + '">' + text + '</div><div class="ts">' + getTime() + '</div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping(){
  var msgs = document.getElementById('msgs');
  var d = document.createElement('div');
  d.className = 'msg bot';
  d.id = 'typing';
  d.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping(){
  var el = document.getElementById('typing');
  if(el) el.remove();
}

function qs(text){ document.getElementById('txt').value = text; send(); }

function send() {
  var input = document.getElementById('txt');
  var btn = document.getElementById('btn');
  var text = input.value.trim();
  if(!text) return;

  addMsg(text, 'user', false);
  input.value = '';
  btn.disabled = true;
  setSt('Thinking...');
  showTyping();

  var xhr = new XMLHttpRequest();
  xhr.open('POST', N8N_URL, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.timeout = 120000;

  xhr.onload = function() {
    removeTyping();
    btn.disabled = false;
    if(xhr.status === 200) {
      var reply = '';
      // n8n streams newline-delimited JSON objects — extract "item" type content
      var lines = xhr.responseText.split('\n');
      for(var i=0; i<lines.length; i++){
        var line = lines[i].trim();
        if(!line) continue;
        try {
          var obj = JSON.parse(line);
          if(obj.type === 'item' && obj.content) reply += obj.content;
        } catch(pe){}
      }
      // fallback: try single JSON object
      if(!reply){
        try {
          var data = JSON.parse(xhr.responseText);
          reply = data.output || data.text || data.message || data.response || '';
        } catch(e){}
      }
      addMsg(reply || xhr.responseText, 'bot', false);
      setSt('Done');
    } else {
      addMsg('Error ' + xhr.status + ': ' + xhr.responseText, 'bot', true);
      setSt('Error');
    }
    setTimeout(function(){ setSt('Ready'); }, 4000);
  };

  xhr.onerror = function() {
    removeTyping();
    btn.disabled = false;
    addMsg('Connection failed. Open DevTools (F12) → Network tab → see what error appears when you send a message.', 'bot', true);
    setSt('Offline');
    setTimeout(function(){ setSt('Ready'); }, 4000);
  };

  xhr.ontimeout = function() {
    removeTyping();
    btn.disabled = false;
    addMsg('Request timed out after 2 minutes. The AI agent may still be processing — check n8n Executions tab.', 'bot', true);
    setSt('Timeout');
    setTimeout(function(){ setSt('Ready'); }, 4000);
  };

  xhr.send(JSON.stringify({
    chatInput: text,
    sessionId: getSid(),
    action: 'sendMessage'
  }));
}
</script>
</body>
</html>
